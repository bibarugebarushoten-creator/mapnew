<div class="ofgf-map-page">

  <div class="map-title">
    <div class="stars">✦✧★✩☆★✧✦</div>
    <h1>LIVE HOUSE MAP</h1>
    <p>click a neighborhood to explore</p>
  </div>

  <div class="map-layout">

    <div class="info-panel" id="infoPanel">
      <span>START HERE</span>
      <h2>Choose a spot</h2>
      <p>Click Shibuya, Shimokitazawa, Koenji, Asagaya, or Roppongi to see the livehouse vibe.</p>
      <a href="#">READ GUIDE →</a>
    </div>

    <div class="map-box">

      <button class="label shibuya" onclick="showArea('shibuya')">SHIBUYA</button>
      <button class="label shimokita" onclick="showArea('shimokita')">SHIMOKITA</button>
      <button class="label koenji" onclick="showArea('koenji')">KOENJI</button>
      <button class="label asagaya" onclick="showArea('asagaya')">ASAGAYA</button>
      <button class="label roppongi" onclick="showArea('roppongi')">ROPPONGI</button>

      <button class="pin p1" onclick="showArea('shibuya')">1</button>
      <button class="pin p2" onclick="showArea('shimokita')">2</button>
      <button class="pin p3" onclick="showArea('koenji')">3</button>
      <button class="pin p4" onclick="showArea('asagaya')">4</button>
      <button class="pin p5" onclick="showArea('roppongi')">5</button>

      <div class="road r1"></div>
      <div class="road r2"></div>
      <div class="road r3"></div>
      <div class="road r4"></div>

      <div class="map-note">
        <strong>SUPPORT LIVE MUSIC</strong>
      </div>

    </div>

  </div>

  <div class="map-footer">
    ☆ GOOD MUSIC ☆ GOOD PEOPLE ☆ GOOD TIMES ☆
  </div>

</div>

<script>
const areaInfo = {
  shibuya: {
    tag: "01 / SHIBUYA",
    title: "Big-city livehouse energy",
    text: "Best for easy access, bigger venues, mixed crowds, late nights, and shows that feel close to Tokyo nightlife.",
    link: "#"
  },
  shimokita: {
    tag: "02 / SHIMOKITAZAWA",
    title: "Indie band central",
    text: "Best for guitar bands, basement venues, small rooms, record-store energy, and discovering bands before they get bigger.",
    link: "#"
  },
  koenji: {
    tag: "03 / KOENJI",
    title: "Punk, weird, underground",
    text: "Best for rougher edges, experimental shows, punk energy, art crowds, and the less polished side of Tokyo music.",
    link: "#"
  },
  asagaya: {
    tag: "04 / ASAGAYA",
    title: "DIY community shows",
    text: "Best for intimate rooms, international-friendly spaces, local scenes, and shows that feel like friend groups colliding.",
    link: "#"
  },
  roppongi: {
    tag: "05 / ROPPONGI",
    title: "International nightlife",
    text: "Best for international shows, bars, mixed-language crowds, and nights that lean more social than underground.",
    link: "#"
  }
};

function showArea(area) {
  const data = areaInfo[area];
  const panel = document.getElementById("infoPanel");

  panel.innerHTML = `
    <span>${data.tag}</span>
    <h2>${data.title}</h2>
    <p>${data.text}</p>
    <a href="${data.link}">READ GUIDE →</a>
  `;

  document.querySelectorAll(".label, .pin").forEach(el => {
    el.classList.remove("active");
  });

  document.querySelectorAll("." + area).forEach(el => {
    el.classList.add("active");
  });
}
</script>
