<div class="ofgf-map-wrap">
  <style>
    .ofgf-map-wrap {
      width: 100%;
      max-width: 980px;
      margin: 0 auto;
      font-family: Arial, Helvetica, sans-serif;
      color: #111;
    }

    .scene-map {
      position: relative;
      width: 100%;
      aspect-ratio: 16 / 10;
      overflow: hidden;
      border: 2px solid #111;
      background:
        linear-gradient(rgba(255,255,255,.045) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.045) 1px, transparent 1px),
        radial-gradient(circle at 30% 65%, rgba(255, 215, 80, .22), transparent 28%),
        radial-gradient(circle at 58% 62%, rgba(255, 40, 80, .22), transparent 25%),
        radial-gradient(circle at 72% 38%, rgba(255, 220, 70, .13), transparent 28%),
        #090812;
      background-size: 70px 70px, 70px 70px, cover, cover, cover, cover;
    }

    .map-title {
      position: absolute;
      top: 22px;
      left: 24px;
      background: #ffd84d;
      border: 2px solid #111;
      box-shadow: 5px 5px 0 #111;
      padding: 10px 14px;
      font-size: clamp(18px, 3vw, 34px);
      font-weight: 900;
      letter-spacing: -1px;
      transform: rotate(-2deg);
      z-index: 5;
    }

    .bg-label {
      position: absolute;
      color: rgba(255,255,255,.38);
      font-weight: 900;
      letter-spacing: 1px;
      text-transform: uppercase;
      font-size: clamp(12px, 1.8vw, 20px);
      pointer-events: none;
    }

    .diy { top: 18%; left: 12%; }
    .clubs { top: 45%; right: 7%; }
    .heart { bottom: 20%; left: 41%; }

    .area {
      position: absolute;
      border: 0;
      background: transparent;
      cursor: pointer;
      transform: translate(-50%, -50%);
      z-index: 3;
    }

    .star {
      display: block;
      font-size: clamp(34px, 5vw, 58px);
      color: #ffdf55;
      text-shadow: 0 0 14px rgba(255, 221, 85, .8);
      transition: transform .18s ease, filter .18s ease;
    }

    .area:hover .star,
    .area.active .star {
      transform: scale(1.2) rotate(8deg);
      filter: brightness(1.25);
    }

    .tag {
      display: inline-block;
      margin-top: -4px;
      padding: 8px 15px;
      background: #f2f2f2;
      border: 2px solid #111;
      border-radius: 999px;
      font-weight: 900;
      font-size: clamp(13px, 1.7vw, 18px);
      box-shadow: 3px 3px 0 #111;
      white-space: nowrap;
    }

    .shimokita .tag {
      background: linear-gradient(90deg, #ffd84d, #ff5a5f, #8cc8ff);
    }

    .info-card {
      position: absolute;
      right: 24px;
      bottom: 24px;
      width: min(330px, calc(100% - 48px));
      background: #fff7cf;
      border: 2px solid #111;
      box-shadow: 6px 6px 0 #111;
      padding: 18px;
      z-index: 10;
    }

    .info-card h3 {
      margin: 0 0 8px;
      font-size: 24px;
      line-height: 1;
    }

    .info-card p {
      margin: 0 0 12px;
      font-size: 15px;
      line-height: 1.45;
    }

    .info-card a {
      display: inline-block;
      color: #111;
      background: #ffd84d;
      border: 2px solid #111;
      padding: 8px 12px;
      font-weight: 900;
      text-decoration: none;
      box-shadow: 3px 3px 0 #111;
    }

    .close-card {
      position: absolute;
      top: 8px;
      right: 10px;
      border: 0;
      background: transparent;
      font-size: 22px;
      font-weight: 900;
      cursor: pointer;
    }

    .sparkle {
      position: absolute;
      color: rgba(255,255,255,.65);
      font-size: 26px;
      pointer-events: none;
      text-shadow: 0 0 10px white;
    }

    .s1 { top: 24%; left: 8%; }
    .s2 { top: 20%; right: 24%; }
    .s3 { bottom: 16%; left: 15%; }
    .s4 { bottom: 10%; left: 62%; }
    .s5 { bottom: 25%; right: 14%; }

    @media (max-width: 700px) {
      .scene-map {
        aspect-ratio: 9 / 13;
      }

      .map-title {
        font-size: 22px;
      }

      .diy { top: 14%; left: 8%; }
      .clubs { top: 43%; right: 4%; }
      .heart { bottom: 33%; left: 25%; }

      .info-card {
        left: 16px;
        right: 16px;
        bottom: 16px;
        width: auto;
      }

      .tag {
        font-size: 13px;
        padding: 6px 10px;
      }
    }
  </style>

  <div class="scene-map">
    <div class="map-title">TOKYO SCENE MAP</div>

    <div class="bg-label diy">DIY/PUNK SCENE</div>
    <div class="bg-label clubs">CLUBS AND PARTIES</div>
    <div class="bg-label heart">HEART OF THE LIVE SCENE</div>

    <div class="sparkle s1">✦</div>
    <div class="sparkle s2">✧</div>
    <div class="sparkle s3">✧</div>
    <div class="sparkle s4">✧</div>
    <div class="sparkle s5">✦</div>

    <button class="area shimokita active" style="left:29%; top:63%;" onclick="showArea('shimokita', this)">
      <span class="star">★</span>
      <span class="tag">Shimokitazawa</span>
    </button>

    <button class="area" style="left:26%; top:34%;" onclick="showArea('koenji', this)">
      <span class="star">★</span>
      <span class="tag">Koenji</span>
    </button>

    <button class="area" style="left:37%; top:31%;" onclick="showArea('asagaya', this)">
      <span class="star">★</span>
      <span class="tag">Asagaya</span>
    </button>

    <button class="area" style="left:48%; top:36%;" onclick="showArea('shinjuku', this)">
      <span class="star">★</span>
      <span class="tag">Shinjuku</span>
    </button>

    <button class="area" style="left:57%; top:59%;" onclick="showArea('shibuya', this)">
      <span class="star">★</span>
      <span class="tag">Shibuya</span>
    </button>

    <button class="area" style="left:68%; top:55%;" onclick="showArea('roppongi', this)">
      <span class="star">★</span>
      <span class="tag">Roppongi</span>
    </button>

    <div class="info-card" id="infoCard">
      <button class="close-card" onclick="hideCard()">×</button>
      <h3 id="areaTitle">Shimokitazawa</h3>
      <p id="areaText">The heart of Tokyo’s live-house scene: indie bands, small venues, record shops, late trains, and lots of music fans wandering between shows.</p>
      <a id="areaLink" href="#">Read the guide</a>
    </div>
  </div>

  <script>
    const areaInfo = {
      shimokita: {
        title: "Shimokitazawa",
        text: "The heart of Tokyo’s live-house scene: indie bands, small venues, record shops, late trains, and lots of music fans wandering between shows.",
        link: "#"
      },
      koenji: {
        title: "Koenji",
        text: "DIY, punk, noise, vintage shops, tiny bars, and underground energy. A great area for scrappier, weirder, more local-feeling shows.",
        link: "#"
      },
      asagaya: {
        title: "Asagaya",
        text: "A community-heavy pocket of the west Tokyo scene, with intimate venues, local regulars, and artsy late-night energy.",
        link: "#"
      },
      shinjuku: {
        title: "Shinjuku",
        text: "Dense, chaotic, and full of venues. Good for discovering everything from rock and idol events to experimental live-house nights.",
        link: "#"
      },
      shibuya: {
        title: "Shibuya",
        text: "A central hub for bigger indie shows, club nights, touring acts, and polished music events. Easy to access and always active.",
        link: "#"
      },
      roppongi: {
        title: "Roppongi",
        text: "More nightlife-focused: clubs, international crowds, parties, bars, and late-night events rather than traditional live-house culture.",
        link: "#"
      }
    };

    function showArea(area, button) {
      const card = document.getElementById("infoCard");
      document.getElementById("areaTitle").textContent = areaInfo[area].title;
      document.getElementById("areaText").textContent = areaInfo[area].text;
      document.getElementById("areaLink").href = areaInfo[area].link;
      card.style.display = "block";

      document.querySelectorAll(".area").forEach(el => el.classList.remove("active"));
      button.classList.add("active");
    }

    function hideCard() {
      document.getElementById("infoCard").style.display = "none";
      document.querySelectorAll(".area").forEach(el => el.classList.remove("active"));
    }
  </script>
</div>
